<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de carteles para partidas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #1c1c1e;
    color: #f0f0f0;
    margin: 0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0; }
  .wrap {
    display: flex;
    gap: 32px;
    width: 100%;
    max-width: 1150px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .panel {
    background: #2a2a2d;
    border-radius: 12px;
    padding: 20px;
    flex: 1 1 340px;
    max-width: 400px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  label { display: block; font-size: 13px; margin: 12px 0 4px; color: #ccc; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1c1c1e;
    color: #f0f0f0;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  .bg-mode-buttons { display: flex; gap: 6px; margin-bottom: 10px; }
  .bg-mode-buttons button {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1c1c1e;
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
  }
  .bg-mode-buttons button.active {
    background: #4a7dff;
    color: white;
    border-color: #4a7dff;
  }
  input[type=color] {
    width: 100%;
    height: 36px;
    border: none;
    border-radius: 6px;
    padding: 0;
    background: none;
    cursor: pointer;
  }
  .bg-section { display: none; }
  .bg-section.active { display: block; }
  canvas {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid #444;
    background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50% / 20px 20px;
  }
  .canvas-wrap { flex: 1 1 560px; display: flex; flex-direction: column; align-items: center; gap: 12px; max-width: 640px; }
  button.main-btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    background: #4a7dff;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.main-btn:hover { background: #3a6ce0; }
  button.secondary-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #555;
    background: transparent;
    color: #bbb;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
  }
  button.secondary-btn:hover { border-color: #888; color: #fff; }
  .size-select { margin-bottom: 10px; }
  .font-controls { display: flex; gap: 10px; }
  .font-controls > div { flex: 1; }
  small { color: #888; font-size: 12px; }
  .check-row { display:flex; align-items:center; gap:8px; cursor:pointer; margin-top:8px; }
  .check-row input { width:auto; }
  .project-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
  .project-buttons button { flex: 1; padding: 10px; font-weight: 600; }
</style>
</head>
<body>

<h1>Generador de carteles para partidas de juegos de mesa</h1>

<div class="wrap">
  <div class="panel">
    <h2>Proyectos (JSON)</h2>
    <div class="project-buttons">
      <button type="button" class="secondary-btn" id="btnNuevo" style="border-color: #e5484d; color: #ff8082;">NUEVO</button>
      <button type="button" class="secondary-btn" id="btnGrabar" style="background: #333; color: #fff;">GRABAR</button>
      <button type="button" class="secondary-btn" id="btnCargar" style="background: #4a7dff; color: #fff; border: none;">CARGAR</button>
    </div>
    <input type="file" id="jsonFileInput" accept=".json" style="display: none;">

    <h2>Contenido</h2>

    <label>Título / Juego</label>
    <input type="text" id="titulo" value="Ark Nova">

    <label>Subtítulo</label>
    <input type="text" id="subtitulo" value="Construye el zoológico más prestigioso mientras desarrollas proyectos de conservación.">

    <label>Descripción</label>
    <textarea id="descripcion">Gestiona un moderno zoológico, atrae especies de todo el mundo y participa en proyectos internacionales de conservación. No necesitas conocer el juego: te enseñamos a jugar.</textarea>

    <div class="row">
      <div>
        <label>Fecha</label>
        <input type="date" id="fecha" value="2026-07-24">
      </div>
      <div>
        <label>Hora inicio</label>
        <input type="text" id="hora" value="17:00">
      </div>
      <div>
        <label>Hora fin (opcional)</label>
        <input type="text" id="horaFin" value="21:00" placeholder="21:00">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Lugar</label>
        <input type="text" id="lugar" value="La Forja (Mieres)">
      </div>
      <div>
        <label>Plazas de la partida</label>
        <input type="text" id="plazas" value="4 jugadores">
      </div>
    </div>

    <h2 style="margin-top:20px">BoardGameGeek</h2>
    <div class="row">
      <div>
        <label>Dificultad BGG (0.1 - 5)</label>
        <input type="number" id="bggDificultad" value="2.7" min="0" max="5" step="0.1">
      </div>
      <div>
        <label>Puntuación BGG (0 - 10)</label>
        <input type="number" id="bggPuntuacion" value="8.5" min="0" max="10" step="0.1">
      </div>
    </div>

    <h2 style="margin-top:20px">Etiquetas</h2>
    <small>Siempre activas: cualquier partida organizada aquí es respetuosa e inclusiva.</small>
    <label class="check-row" style="opacity:0.55" title="Siempre activo">
      <input type="checkbox" id="chkInclusivo" checked disabled> 🌈 Ambiente inclusivo
    </label>
    <label class="check-row" style="opacity:0.55" title="Siempre activo">
      <input type="checkbox" id="chkNovatos" checked disabled> 🤝 Novat@s Friendly
    </label>
    <label class="check-row" style="opacity:0.55" title="Siempre activo">
      <input type="checkbox" id="chkMP" checked disabled> ✉️ MP para pedir plaza
    </label>

    <h2 style="margin-top:20px">Avisos</h2>
    <label class="check-row"><input type="checkbox" id="chkPuntualidad"> ⏰ Pedir puntualidad (franja destacada)</label>
  </div>

  <div class="panel">
    <h2>Imagen del juego</h2>
    <label>Portada / foto de la caja</label>
    <input type="file" id="imagenPortadaArchivo" accept="image/*">
    <small id="imagenPortadaNombre" style="display:block; margin-top:6px;"></small>

    <h2 style="margin-top:20px">Fondo exterior</h2>
    <div class="bg-mode-buttons">
      <button type="button" data-mode="gradient" class="active">Degradado</button>
      <button type="button" data-mode="color">Color sólido</button>
      <button type="button" data-mode="image">Imagen</button>
    </div>

    <div class="bg-section" id="bg-color">
      <label>Color de fondo</label>
      <input type="color" id="colorFondo" value="#1d2b53">
    </div>

    <div class="bg-section active" id="bg-gradient">
      <div class="row">
        <div>
          <label>Color 1</label>
          <input type="color" id="gradColor1" value="#1b2430">
        </div>
        <div>
          <label>Color 2</label>
          <input type="color" id="gradColor2" value="#62758b">
        </div>
      </div>
      <label>Ángulo (grados)</label>
      <input type="number" id="gradAngulo" value="145" min="0" max="360">
    </div>

    <div class="bg-section" id="bg-image">
      <label>Subir imagen de fondo</label>
      <input type="file" id="imagenFondoArchivo" accept="image/*">
      <small id="imagenFondoNombre" style="display:block; margin-top:6px;"></small>
      <label style="margin-top:10px">Oscurecer imagen (overlay)</label>
      <input type="range" id="overlayOpacidad" min="0" max="90" value="35">
    </div>

    <h2 style="margin-top:20px">Tarjeta</h2>
    <div class="font-controls">
      <div>
        <label>Color de la tarjeta</label>
        <input type="color" id="colorTarjeta" value="#fffdf9">
      </div>
      <div>
        <label>Color de acento</label>
        <input type="color" id="colorAcento" value="#d8b15a">
      </div>
    </div>
    <label style="margin-top:14px">Escala general del texto: <span id="escalaValor">100%</span></label>
    <input type="range" id="escalaTexto" min="60" max="160" value="100" step="5">

    <h2 style="margin-top:20px">Tamaño del cartel</h2>
    <select id="tamanoBanner" class="size-select">
      <option value="1080x1350" selected>Instagram vertical (1080 x 1350)</option>
      <option value="1600x1000">Apaisado (poster / web)</option>
      <option value="1200x630">1200 x 630 (redes / Facebook / Twitter)</option>
      <option value="1080x1080">Instagram cuadrado (1080 x 1080)</option>
    </select>

    <button type="button" class="secondary-btn" id="resetConfigBtn" style="margin-top:16px">Restablecer valores por defecto</button>
  </div>

  <div class="canvas-wrap panel">
    <h2>Vista previa</h2>
    <canvas id="canvas" width="1080" height="1350"></canvas>
    <button class="main-btn" id="descargarBtn">Descargar PNG</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const SERIF = "'Cormorant Garamond', Georgia, serif";
const SANS = "Inter, -apple-system, sans-serif";

const inputs = ['titulo','subtitulo','descripcion','fecha','hora','horaFin','lugar','plazas',
  'bggDificultad','bggPuntuacion','chkPuntualidad',
  'colorFondo','gradColor1','gradColor2','gradAngulo','overlayOpacidad',
  'colorTarjeta','colorAcento','escalaTexto'];

let bgMode = 'gradient';
let portadaImage = null;
let fondoImage = null;

// ---------- Carga de imagenes ----------
function loadImageFile(inputId, nombreId, onLoaded) {
  document.getElementById(inputId).addEventListener('change', (e) => {
    const file = e.target.files[0];
    const nombreEl = document.getElementById(nombreId);
    if (!file) return;
    nombreEl.textContent = 'Cargando...';
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        onLoaded(img, ev.target.result);
        nombreEl.textContent = 'OK ' + file.name;
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
loadImageFile('imagenPortadaArchivo', 'imagenPortadaNombre', (img) => { portadaImage = img; });
loadImageFile('imagenFondoArchivo', 'imagenFondoNombre', (img) => { fondoImage = img; });

document.querySelectorAll('.bg-mode-buttons button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-mode-buttons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bgMode = btn.dataset.mode;
    document.querySelectorAll('.bg-section').forEach(s => s.classList.remove('active'));
    document.getElementById('bg-' + bgMode).classList.add('active');
    render();
  });
});

document.getElementById('tamanoBanner').addEventListener('change', (e) => {
  const [w, h] = e.target.value.split('x').map(Number);
  canvas.width = w;
  canvas.height = h;
  render();
});

inputs.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

document.getElementById('escalaTexto').addEventListener('input', (e) => {
  document.getElementById('escalaValor').textContent = e.target.value + '%';
});

// ---------- Utilidades de dibujo ----------
function roundRect(x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawImageCover(img, x, y, w, h, radius) {
  ctx.save();
  roundRect(x, y, w, h, radius);
  ctx.clip();
  const scale = Math.max(w / img.width, h / img.height);
  const iw = img.width * scale, ih = img.height * scale;
  ctx.drawImage(img, x + (w - iw) / 2, y + (h - ih) / 2, iw, ih);
  ctx.restore();
}

function getWrappedLines(text, maxWidth) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (let word of words) {
    const testLine = line + word + ' ';
    if (ctx.measureText(testLine).width > maxWidth && line !== '') {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line = testLine;
    }
  }
  lines.push(line.trim());
  return lines;
}

function drawWrappedText(text, x, y, maxWidth, lineHeight) {
  const lines = getWrappedLines(text, maxWidth);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return lines.length;
}

function formatFecha(isoDate) {
  if (!isoDate) return '';
  const [year, month, day] = isoDate.split('-').map(Number);
  const date = new Date(year, month - 1, day);
  const texto = date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
  return texto.charAt(0).toUpperCase() + texto.slice(1);
}

function formatFechaCorta(isoDate) {
  if (!isoDate) return '';
  const [year, month, day] = isoDate.split('-').map(Number);
  const date = new Date(year, month - 1, day);
  const texto = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
  return texto.charAt(0).toUpperCase() + texto.slice(1);
}

function sanitizeForFilename(text) {
  return text
    .replace(/[()[\]{}]/g, '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function buildFilename() {
  const titulo = sanitizeForFilename(document.getElementById('titulo').value) || 'Cartel';
  const fecha = sanitizeForFilename(formatFechaCorta(document.getElementById('fecha').value));
  const lugar = sanitizeForFilename(document.getElementById('lugar').value);
  const parts = [titulo, fecha, lugar].filter(Boolean);
  return parts.join(' - ') + '.png';
}

function dificultadColor(valor) {
  if (valor <= 1.8) return '#3fb950';
  if (valor <= 3) return '#e8912d';
  return '#e5484d';
}

// ---------- Fondo exterior ----------
function drawOuterBackground() {
  const w = canvas.width, h = canvas.height;
  if (bgMode === 'color') {
    ctx.fillStyle = document.getElementById('colorFondo').value;
    ctx.fillRect(0, 0, w, h);
  } else if (bgMode === 'gradient') {
    const angle = Number(document.getElementById('gradAngulo').value) * Math.PI / 180;
    const x1 = w / 2 - Math.cos(angle) * w / 2;
    const y1 = h / 2 - Math.sin(angle) * h / 2;
    const x2 = w / 2 + Math.cos(angle) * w / 2;
    const y2 = h / 2 + Math.sin(angle) * h / 2;
    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, document.getElementById('gradColor1').value);
    grad.addColorStop(1, document.getElementById('gradColor2').value);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  } else if (bgMode === 'image') {
    if (fondoImage) {
      drawImageCover(fondoImage, 0, 0, w, h, 0);
      const opacity = Number(document.getElementById('overlayOpacidad').value) / 100;
      ctx.fillStyle = `rgba(0,0,0,${opacity})`;
      ctx.fillRect(0, 0, w, h);
    } else {
      ctx.fillStyle = '#2a2a2d';
      ctx.fillRect(0, 0, w, h);
    }
  }
}

// ---------- Render principal ----------
function render() {
  const w = canvas.width, h = canvas.height;
  const escala = Number(document.getElementById('escalaTexto').value) / 100;
  const cardColor = document.getElementById('colorTarjeta').value;
  const accentColor = document.getElementById('colorAcento').value;
  const textDark = '#1b1e23';
  const textSoft = '#667085';
  const textBody = '#495363';

  ctx.clearRect(0, 0, w, h);
  drawOuterBackground();

  const wide = (w / h) > 1.25;
  const outerPad = w * 0.045;
  const cardX = outerPad, cardY = outerPad;
  const cardW = w - outerPad * 2, cardH = h - outerPad * 2;
  const cardRadius = w * 0.022;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = w * 0.03;
  ctx.shadowOffsetY = h * 0.015;
  ctx.fillStyle = cardColor;
  roundRect(cardX, cardY, cardW, cardH, cardRadius);
  ctx.fill();
  ctx.restore();

  const innerPad = cardW * (wide ? 0.045 : 0.05);
  const columnGap = cardW * (wide ? 0.05 : 0);
  let colLeftX, colLeftW, imgX, imgY, imgW, imgH;

  if (wide) {
    colLeftW = cardW * 0.53;
    colLeftX = cardX + innerPad;
    imgW = cardW - innerPad * 2 - colLeftW - columnGap;
    imgH = cardH - innerPad * 2;
    imgX = colLeftX + colLeftW + columnGap;
    imgY = cardY + innerPad;
  } else {
    colLeftW = cardW - innerPad * 2;
    colLeftX = cardX + innerPad;
    imgW = colLeftW;
    imgH = cardH * 0.36;
    imgX = colLeftX;
    imgY = cardY + innerPad;
  }

  // Dibujar la portada / recuadro del juego
  if (portadaImage) {
    drawImageCover(portadaImage, imgX, imgY, imgW, imgH, cardRadius * 0.7);
  } else {
    ctx.fillStyle = '#eceef1';
    roundRect(imgX, imgY, imgW, imgH, cardRadius * 0.7);
    ctx.fill();
    ctx.fillStyle = '#98a2b3';
    ctx.font = `${16 * escala}px ${SANS}`;
    ctx.textAlign = 'center';
    ctx.fillText('Sube la portada del juego', imgX + imgW / 2, imgY + imgH / 2);
  }

  // --- Pastillas BGG superpuestas ---
  const bggDificultad = parseFloat(document.getElementById('bggDificultad').value) || 0;
  const bggPuntuacion = parseFloat(document.getElementById('bggPuntuacion').value) || 0;

  const overlayPillSize = (wide ? Math.max(11, cardW * 0.012) : Math.max(15, cardW * 0.018)) * escala;
  ctx.font = `600 ${overlayPillSize}px ${SANS}`;
  
  const diffText = `Dificultad BGG - ${bggDificultad.toFixed(1)} / 5`;
  const scoreText = `⭐ ${bggPuntuacion.toFixed(1)} / 10`;

  const diffTextW = ctx.measureText(diffText).width;
  const scoreTextW = ctx.measureText(scoreText).width;
  
  const oPillPadX = overlayPillSize * 1.0;
  const oDotR = overlayPillSize * 0.28;

  const dPillW = diffTextW + oPillPadX * 2 + oDotR * 2 + overlayPillSize * 0.5;
  const sPillW = scoreTextW + oPillPadX * 2;
  const oPillH = overlayPillSize * 2.2;

  const imgMargin = overlayPillSize * 0.8;
  const scoreX = imgX + imgW - imgMargin - sPillW;
  const diffX = scoreX - overlayPillSize * 0.6 - dPillW;
  const pillsY = imgY + imgH - imgMargin - oPillH;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 4;
  
  ctx.fillStyle = 'rgba(255, 255, 255, 0.94)';
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
  ctx.lineWidth = 1.5;
  roundRect(diffX, pillsY, dPillW, oPillH, oPillH / 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = dificultadColor(bggDificultad);
  ctx.beginPath();
  ctx.arc(diffX + oPillPadX + oDotR, pillsY + oPillH / 2, oDotR, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = textDark;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText(diffText, diffX + oPillPadX + oDotR * 2 + overlayPillSize * 0.5, pillsY + oPillH / 2 + overlayPillSize * 0.05);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.94)';
  roundRect(scoreX, pillsY, sPillW, oPillH, oPillH / 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = textDark;
  ctx.fillText(scoreText, scoreX + oPillPadX, pillsY + oPillH / 2 + overlayPillSize * 0.05);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';

  // --- Bloque de Texto Central ---
  let y = wide ? cardY + innerPad : imgY + imgH + innerPad * 0.8;
  y += cardH * 0.01;

  const tituloSize = (wide ? Math.max(30, cardW * 0.062) : Math.max(42, cardW * 0.082)) * escala;
  const subSize = (wide ? Math.max(14, cardW * 0.0165) : Math.max(18, cardW * 0.024)) * escala;
  const descSize = (wide ? Math.max(14, cardW * 0.0155) : Math.max(18, cardW * 0.023)) * escala;

  // Título
  ctx.font = `600 ${tituloSize}px ${SERIF}`;
  ctx.fillStyle = textDark;
  ctx.textAlign = 'left';
  const tituloLines = drawWrappedText(document.getElementById('titulo').value, colLeftX, y + tituloSize * 0.85, colLeftW, tituloSize * 0.98);
  y += tituloLines * tituloSize * 0.98 + tituloSize * 0.35;

  // Subtítulo
  ctx.font = `400 ${subSize}px ${SANS}`;
  ctx.fillStyle = textSoft;
  const subtitulo = document.getElementById('subtitulo').value;
  if (subtitulo) {
    const subLines = drawWrappedText(subtitulo, colLeftX, y + subSize, colLeftW, subSize * 1.5);
    y += subLines * subSize * 1.5 + subSize * 0.9;
  }

  // Descripción
  ctx.font = `400 ${descSize}px ${SANS}`;
  ctx.fillStyle = textBody;
  const descLines = drawWrappedText(document.getElementById('descripcion').value, colLeftX, y + descSize, colLeftW, descSize * 1.65);
  y += descLines * descSize * 1.65 + descSize * 1.1;

  // Primera línea divisoria (Arriba del grid)
  ctx.strokeStyle = '#e8eaed';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(colLeftX, y);
  ctx.lineTo(colLeftX + colLeftW, y);
  ctx.stroke();

  // --- Configuración de escala y espaciado del grid ---
  const labelSize = (wide ? Math.max(11, cardW * 0.012) : Math.max(15, cardW * 0.019)) * escala;
  const valueSize = (wide ? Math.max(16, cardW * 0.0195) : Math.max(22, cardW * 0.028)) * escala;

  const labelValueGap = valueSize * 0.22; 
  const rowGap = valueSize * 0.55;        
  const paddingLineas = valueSize * 0.65; 

  y += paddingLineas;

  const fecha = formatFecha(document.getElementById('fecha').value);
  const hora = document.getElementById('hora').value;
  const horaFin = document.getElementById('horaFin').value.trim();
  const horario = horaFin ? `${hora} - ${horaFin}` : hora;
  const lugar = document.getElementById('lugar').value;
  const plazas = document.getElementById('plazas').value;

  const gridItems = [
    ['FECHA', fecha],
    ['HORARIO', horario],
    ['LUGAR', lugar],
    ['PLAZAS', plazas]
  ];
  const gridColW = colLeftW / 2;
  const singleRowH = labelSize + labelValueGap + valueSize;

  // --- MODIFICADO: Alineación y cálculo centrado para los textos del grid ---
  ctx.textAlign = 'center'; 

  gridItems.forEach(([label, value], i) => {
    const col = i % 2, row = Math.floor(i / 2);
    // Calculamos el punto de origen en el centro exacto de cada columna
    const gx = colLeftX + col * gridColW + (gridColW / 2);
    const gy = y + row * (singleRowH + rowGap);
    
    ctx.font = `600 ${labelSize}px ${SANS}`;
    ctx.fillStyle = '#98a2b3';
    ctx.fillText(label, gx, gy + labelSize);
    
    ctx.font = `700 ${valueSize}px ${SANS}`;
    ctx.fillStyle = textDark;
    ctx.fillText(value, gx, gy + labelSize + labelValueGap + valueSize);
  });
  
  ctx.textAlign = 'left'; // Restauramos la alineación base por seguridad

  // Sumamos la altura real del contenido del grid y añadimos el padding simétrico final
  const totalGridH = (singleRowH * 2) + rowGap;
  y += totalGridH + paddingLineas;

  // Segunda línea divisoria (Debajo del grid)
  ctx.strokeStyle = '#e8eaed';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(colLeftX, y);
  ctx.lineTo(colLeftX + colLeftW, y);
  ctx.stroke();
  
  y += descSize * 1.2;

  // --- Cálculo de bloques inferiores pegados al fondo de la tarjeta ---
  const tags = ['🌈 Ambiente inclusivo', '🤝 Novat@s Friendly', '✉️ MP para pedir plaza'];
  const tagH = valueSize * 2.3;
  const barH = valueSize * 2.4;
  const chkPuntualidad = document.getElementById('chkPuntualidad').checked;

  let espacioFinal = tagH;
  if (chkPuntualidad) {
    espacioFinal += barH + descSize * 0.8;
  }

  let finalBlockY = Math.max(y, cardY + cardH - innerPad - espacioFinal);

  // Aviso de puntualidad
  if (chkPuntualidad) {
    ctx.fillStyle = '#1b1e23';
    roundRect(colLeftX, finalBlockY, colLeftW, barH, barH * 0.2);
    ctx.fill();
    ctx.font = `700 ${valueSize * 0.85}px ${SANS}`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏰ Se ruega puntualidad, por respeto a tod@s', colLeftX + colLeftW / 2, finalBlockY + barH / 2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    finalBlockY += barH + descSize * 0.8;
  }

  // Pastillas inferiores
  {
    const tagGap = cardW * 0.012;
    const tagsRowW = colLeftW;
    const tagW = (tagsRowW - tagGap * (tags.length - 1)) / tags.length;
    const tagFontBase = (wide ? Math.max(12, cardW * 0.013) : Math.max(18, cardW * 0.024)) * escala;
    
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    tags.forEach((tag, i) => {
      const tx = colLeftX + i * (tagW + tagGap);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.06)';
      ctx.shadowBlur = tagH * 0.3;
      ctx.shadowOffsetY = tagH * 0.05;
      ctx.fillStyle = '#fafbfc';
      ctx.strokeStyle = '#e8eaed';
      ctx.lineWidth = 1.5;
      roundRect(tx, finalBlockY, tagW, tagH, tagH / 2);
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#e8eaed';
      ctx.lineWidth = 1.5;
      roundRect(tx, finalBlockY, tagW, tagH, tagH / 2);
      ctx.stroke();
      
      let fitSize = tagFontBase;
      ctx.font = `600 ${fitSize}px ${SANS}`;
      while (ctx.measureText(tag).width > tagW - 10 && fitSize > 12) {
        fitSize -= 0.5;
        ctx.font = `600 ${fitSize}px ${SANS}`;
      }
      ctx.fillStyle = textDark;
      ctx.fillText(tag, tx + tagW / 2, finalBlockY + tagH / 2);
    });
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  saveConfig();
}

// ---------- Guardado local ----------
function serializeConfig() {
  const config = {};
  inputs.forEach(id => {
    const el = document.getElementById(id);
    config[id] = el.type === 'checkbox' ? el.checked : el.value;
  });
  config.bgMode = bgMode;
  config.tamanoBanner = document.getElementById('tamanoBanner').value;
  if (portadaImage) config.portadaSrc = portadaImage.src;
  if (fondoImage) config.fondoSrc = fondoImage.src;
  return config;
}

// Resto de funciones auxiliares intactas
function saveConfig() { try { const config = serializeConfig(); localStorage.setItem('cartelPartidaConfig', JSON.stringify(config)); } catch (e) { console.warn(e); } }
function applyConfigObject(config) { inputs.forEach(id => { if (!(id in config)) return; const el = document.getElementById(id); if (el.type === 'checkbox') el.checked = config[id]; else el.value = config[id]; }); if (config.tamanoBanner) { document.getElementById('tamanoBanner').value = config.tamanoBanner; const [w, h] = config.tamanoBanner.split('x').map(Number); canvas.width = w; canvas.height = h; } if (config.bgMode) { bgMode = config.bgMode; document.querySelectorAll('.bg-mode-buttons button').forEach(b => { b.classList.toggle('active', b.dataset.mode === bgMode); }); document.querySelectorAll('.bg-section').forEach(s => s.classList.remove('active')); document.getElementById('bg-' + bgMode).classList.add('active'); } document.getElementById('escalaValor').textContent = document.getElementById('escalaTexto').value + '%'; let imagesToLoad = 0; if (config.portadaSrc) imagesToLoad++; if (config.fondoSrc) imagesToLoad++; if (imagesToLoad === 0) { render(); return; } let loaded = 0; const done = () => { if (++loaded === imagesToLoad) render(); }; if (config.portadaSrc) { const img = new Image(); img.onload = () => { portadaImage = img; document.getElementById('imagenPortadaNombre').textContent = 'Fichero cargado'; done(); }; img.src = config.portadaSrc; } else { portadaImage = null; document.getElementById('imagenPortadaNombre').textContent = ''; } if (config.fondoSrc) { const img = new Image(); img.onload = () => { fondoImage = img; document.getElementById('imagenFondoNombre').textContent = 'Fichero cargado'; done(); }; img.src = config.fondoSrc; } else { fondoImage = null; document.getElementById('imagenFondoNombre').textContent = ''; } }
function loadConfig() { const raw = localStorage.getItem('cartelPartidaConfig'); if (!raw) return; try { applyConfigObject(JSON.parse(raw)); } catch (e) { console.warn(e); } }

// ---------- Gestión de Proyectos (JSON) ----------
document.getElementById('btnNuevo').addEventListener('click', () => { if (confirm('¿Seguro que quieres empezar un cartel nuevo? Se perderán los cambios que no hayas guardado.')) { localStorage.removeItem('cartelPartidaConfig'); document.getElementById('titulo').value = 'Nuevo Juego'; document.getElementById('subtitulo').value = 'Escribe aquí un subtítulo breve del juego.'; document.getElementById('descripcion').value = 'Explicación de la partida o ambientación rápida. Te enseñamos las reglas paso a paso.'; document.getElementById('fecha').value = new Date().toISOString().split('T')[0]; document.getElementById('hora').value = '17:00'; document.getElementById('horaFin').value = '21:00'; document.getElementById('lugar').value = 'La Forja (Mieres)'; document.getElementById('plazas').value = '4 jugadores'; document.getElementById('bggDificultad').value = '2.5'; document.getElementById('bggPuntuacion').value = '7.5'; document.getElementById('chkPuntualidad').checked = false; document.getElementById('escalaTexto').value = '100'; document.getElementById('escalaValor').textContent = '100%'; portadaImage = null; fondoImage = null; document.getElementById('imagenPortadaNombre').textContent = ''; document.getElementById('imagenFondoNombre').textContent = ''; document.getElementById('imagenPortadaArchivo').value = ''; document.getElementById('imagenFondoArchivo').value = ''; document.getElementById('tamanoBanner').value = '1080x1350'; canvas.width = 1080; canvas.height = 1350; render(); } });
document.getElementById('btnGrabar').addEventListener('click', () => { const config = serializeConfig(); const jsonString = JSON.stringify(config, null, 2); const blob = new Blob([jsonString], { type: 'application/json' }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); const juego = sanitizeForFilename(document.getElementById('titulo').value) || 'Proyecto'; link.download = `${juego}.json`; link.href = url; document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); });
const jsonFileInput = document.getElementById('jsonFileInput'); document.getElementById('btnCargar').addEventListener('click', () => jsonFileInput.click()); jsonFileInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const config = JSON.parse(ev.target.result); applyConfigObject(config); jsonFileInput.value = ''; } catch (err) { alert('Error al leer el archivo JSON: ' + err.message); } }; reader.readAsText(file); });
document.getElementById('resetConfigBtn').addEventListener('click', () => { if (confirm('¿Restablecer todos los valores por defecto? Se borrará el almacenamiento local.')) { localStorage.removeItem('cartelPartidaConfig'); location.reload(); } });
document.getElementById('descargarBtn').addEventListener('click', () => { try { const dataUrl = canvas.toDataURL('image/png'); const link = document.createElement('a'); link.download = buildFilename(); link.href = dataUrl; document.body.appendChild(link); link.click(); document.body.removeChild(link); } catch (err) { alert('No se pudo generar el PNG: ' + err.message); } });

// ---------- Arranque ----------
loadConfig();
if (document.fonts && document.fonts.load) { Promise.all([ document.fonts.load("600 40px 'Cormorant Garamond'"), document.fonts.load("400 16px 'Inter'"), document.fonts.load("600 16px 'Inter'"), document.fonts.load("700 16px 'Inter'") ]).then(render).catch(render); }
render();
</script>
